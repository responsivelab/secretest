<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non disponibile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f9f9f9; font-family: 'Inter', sans-serif;
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .wrap { text-align: center; padding: 40px; max-width: 400px; }
  .icon { font-size: 52px; margin-bottom: 24px; }
  h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 10px; }
  p { font-size: 14px; color: #888; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🔒</div>
  <h1>Servizio non disponibile</h1>
  <p>Il servizio è temporaneamente offline.<br>Riprova più tardi.</p>
</div>
</body>
</html>
