<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Accesso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff; color: #111; font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .wrap { width: 100%; max-width: 360px; padding: 24px; }
  .logo { display: flex; justify-content: center; margin-bottom: 40px; }
  .logo-circle {
    width: 56px; height: 56px; border-radius: 50%; background: #111;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-circle svg {
    width: 26px; height: 26px; fill: none; stroke: #fff;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }
  h1 { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; text-align: center; margin-bottom: 36px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 6px; }
  input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; font-family: inherit; color: #111;
    background: #fafafa; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
  }
  input:focus { border-color: #111; background: #fff; }
  input::placeholder { color: #bbb; font-size: 14px; }
  input[type="password"] { letter-spacing: 3px; }
  input[type="password"]::placeholder { letter-spacing: 0; }
  .btn {
    width: 100%; padding: 14px; background: #111; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: background 0.15s; margin-top: 4px;
  }
  .btn:hover { background: #222; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    display: none; margin-top: 14px; padding: 12px 14px;
    background: #fff0f3; border: 1px solid #ffc0cb;
    border-radius: 8px; font-size: 13px; color: #c0003a; text-align: center;
  }
  .error-box.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .footer-note { margin-top: 28px; text-align: center; font-size: 11px; color: #ccc; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-circle">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
  </div>
  <h1>Accesso</h1>
  <p class="subtitle">Inserisci le tue credenziali</p>
  <label for="email">Email</label>
  <input type="email" id="email" placeholder="nome@email.com" autocomplete="off">
  <label for="password">Password</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="off">
  <button class="btn" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">Accedi</span>
    <span class="spinner"></span>
  </button>
  <div class="error-box" id="errorBox">Password non corretta. Riprova.</div>
  <p class="footer-note">Connessione sicura</p>
</div>
<script>
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

  async function doLogin() {
    const pw  = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorBox');
    err.classList.remove('show');
    if (!pw) { err.classList.add('show'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    try {
      const res  = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (!res.ok) { err.classList.add('show'); return; }
      if (data.access === 'chat') {
        sessionStorage.setItem('sc_token', data.token);
        sessionStorage.setItem('sc_user',  data.userId);
        sessionStorage.setItem('sc_name',  data.userName);
        window.location.href = '/chat.html';
      } else if (data.access === 'decoy') {
        window.location.href = '/decoy.html';
      }
    } catch { err.classList.add('show'); }
    finally  { btn.classList.remove('loading'); btn.disabled = false; }
  }
</script>
</body>
</html>
