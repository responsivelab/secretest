<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestione Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff; color: #111; font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    transition: background 0.8s ease, color 0.8s ease;
  }

  body.someone-online {
    background: #111;
    color: #eee;
  }

  body.someone-online .logo-circle { background: #222; }
  body.someone-online .logo-circle svg { stroke: #aaa; }
  body.someone-online h1 { color: #eee; }
  body.someone-online .subtitle { color: #555; }
  body.someone-online label { color: #666; }
  body.someone-online input {
    background: #1a1a1a; border-color: #2a2a2a;
    color: #eee;
  }
  body.someone-online input:focus { border-color: #444; background: #222; }
  body.someone-online input::placeholder { color: #444; }
  body.someone-online .btn { background: #22c55e; color: #fff; }
  body.someone-online .btn:hover { background: #16a34a; }
  body.someone-online .error-box { background: #1a0a00; border-color: #5a2a00; color: #ffaa55; }
  body.someone-online .footer-note { color: #333; }
  body.someone-online .links { color: #444; }
  .wrap { width: 100%; max-width: 360px; padding: 24px; }
  .logo { display: flex; justify-content: center; margin-bottom: 40px; }
  .logo-circle {
    width: 56px; height: 56px; border-radius: 14px; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-circle svg {
    width: 28px; height: 28px; fill: none; stroke: #555;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }
  h1 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 6px; color: #111; }
  .subtitle { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 36px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #888; margin-bottom: 6px; }
  input {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid #ebebeb; border-radius: 10px;
    font-size: 15px; font-family: inherit; color: #111;
    background: #fafafa; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
  }
  input:focus { border-color: #ccc; background: #fff; }
  input::placeholder { color: #ccc; font-size: 14px; }
  input[type="password"] { letter-spacing: 3px; }
  input[type="password"]::placeholder { letter-spacing: 0; }
  .btn {
    width: 100%; padding: 14px; background: #111; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 500; font-family: inherit;
    cursor: pointer; transition: background 0.15s; margin-top: 4px;
  }
  .btn:hover { background: #222; }
  .btn:disabled { background: #ddd; cursor: not-allowed; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    display: none; margin-top: 14px; padding: 12px 14px;
    background: #fff8f0; border: 1px solid #ffddb8;
    border-radius: 8px; font-size: 13px; color: #b45309; text-align: center;
  }
  .error-box.show { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  .footer-note { margin-top: 28px; text-align: center; font-size: 11px; color: #ddd; }
  .links {
    display: flex; justify-content: space-between;
    margin-top: 16px; font-size: 12px; color: #bbb;
  }
  .links span { cursor: pointer; }
  .links span:hover { color: #888; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-circle">
      <!-- icona neutra: persona/profilo -->
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </div>
  </div>

  <h1>Taccuino personale</h1>
  <p class="subtitle">Inserisci il codice di accesso</p>

  <label for="password">Codice di accesso</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="off" autofocus>

  <button class="btn" id="loginBtn" onclick="doLogin()">
    <span class="btn-text">Continua</span>
    <span class="spinner"></span>
  </button>

  <div class="error-box" id="errorBox">
    Codice non riconosciuto. Verifica e riprova.
  </div>

  <div class="links">
    <span>Hai dimenticato il codice?</span>
    <span>Assistenza</span>
  </div>

  <p class="footer-note">v2.1.4</p>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw  = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorBox');
    err.classList.remove('show');
    if (!pw) { err.classList.add('show'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    try {
      const res  = await fetch('/api/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (!res.ok) { err.classList.add('show'); return; }
      if (data.access === 'chat') {
        sessionStorage.setItem('sc_token', data.token);
        sessionStorage.setItem('sc_user',  data.userId);
        sessionStorage.setItem('sc_name',  data.userName);
        window.location.href = '/chat.html';
      } else if (data.access === 'decoy') {
        window.location.href = '/decoy.html';
      }
    } catch { err.classList.add('show'); }
    finally  { btn.classList.remove('loading'); btn.disabled = false; }
  }
  // ── Polling: se qualcuno è connesso la pagina diventa nera ──────────────────
  async function checkOnline() {
    try {
      const res  = await fetch('/api/online');
      const data = await res.json();
      document.body.classList.toggle('someone-online', data.anyone);
    } catch {}
  }

  checkOnline();
  setInterval(checkOnline, 5000); // controlla ogni 5 secondi
</script>
</body>
</html>
